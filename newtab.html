<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2e3147;
      --text: #e8eaf6;
      --muted: #7b7f9e;
      --accent: #5b7cf6;
      --accent-hover: #7b96ff;
      --radius: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 32px;
      padding-top: 48px;
    }

    h1 {
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: var(--muted);
      text-transform: uppercase;
    }

    #search-form {
      display: flex;
      width: 100%;
      max-width: 560px;
      padding: 0 24px;
    }

    #search-input {
      flex: 1;
      padding: 16px 20px;
      font-size: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-right: none;
      border-radius: var(--radius) 0 0 var(--radius);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    #search-input::placeholder { color: var(--muted); }
    #search-input:focus { border-color: var(--accent); }

    .engine-selector {
      position: relative;
      flex-shrink: 0;
      display: flex;
    }

    #search-btn {
      padding: 16px 20px;
      background: var(--accent);
      border: 1px solid var(--accent);
      border-right: none;
      border-radius: 0;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #search-btn:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

    #engine-btn {
      padding: 16px 12px;
      background: var(--accent);
      border: 1px solid var(--accent);
      border-left: 1px solid rgba(255,255,255,0.2);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: background 0.2s;
    }

    #engine-btn:hover { background: var(--accent-hover); }

    .engine-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      z-index: 100;
      min-width: 150px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    .engine-dropdown button {
      display: block;
      width: 100%;
      padding: 10px 16px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 14px;
      text-align: left;
      cursor: pointer;
    }

    .engine-dropdown button:hover { background: var(--border); }
    .engine-dropdown button.active { color: var(--accent); }
    .engine-dropdown.hidden { display: none; }
  </style>
</head>
<body>
  <h1>New Tab</h1>
  <form id="search-form" action="https://www.google.com/search" method="GET">
    <input id="search-input" type="text" name="q" placeholder="Search Google…" autofocus autocomplete="off" />
    <div class="engine-selector">
      <button id="search-btn" type="submit">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        Search
      </button>
      <button type="button" id="engine-btn">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div id="engine-dropdown" class="engine-dropdown hidden">
        <button type="button" id="opt-google" onclick="setEngine('google')">Google</button>
        <button type="button" id="opt-duckduckgo" onclick="setEngine('duckduckgo')">DuckDuckGo</button>
      </div>
    </div>
  </form>

  <script>
    const ENGINES = {
      google:     { action: 'https://www.google.com/search', placeholder: 'Search Google…',     label: 'Google' },
      duckduckgo: { action: 'https://duckduckgo.com/',       placeholder: 'Search DuckDuckGo…', label: 'DuckDuckGo' }
    };

    function setEngine(name) {
      const engine = ENGINES[name];
      document.getElementById('search-form').action = engine.action;
      document.getElementById('search-input').placeholder = engine.placeholder;
      document.getElementById('engine-dropdown').classList.add('hidden');
      document.querySelectorAll('.engine-dropdown button').forEach(b => b.classList.remove('active'));
      const opt = document.getElementById('opt-' + name);
      if (opt) opt.classList.add('active');
      localStorage.setItem('searchEngine', name);
    }

    document.getElementById('engine-btn').addEventListener('click', () => {
      document.getElementById('engine-dropdown').classList.toggle('hidden');
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.engine-selector')) {
        document.getElementById('engine-dropdown').classList.add('hidden');
      }
    });

    setEngine(localStorage.getItem('searchEngine') || 'google');

    document.addEventListener("keydown", (e) => {
      const inp = document.getElementById("search-input");
      if (document.activeElement !== inp && e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
        inp.focus();
      }
    });
  </script>
</body>
</html>
