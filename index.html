<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <style>
    /* ── CONFIG: paste your OpenWeatherMap key on line ~160 ── */

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2e3147;
      --text: #e8eaf6;
      --muted: #7b7f9e;
      --accent: #5b7cf6;
      --accent-hover: #7b96ff;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 48px 24px 24px;
    }

    /* ── Two-column page layout ── */
    #clock {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.05em;
      width: 100%;
      max-width: 1100px;
      text-align: left;
      padding-left: 4px;
      margin-bottom: 8px;
    }

    #greeting {
      font-size: 28px;
      font-weight: 300;
      color: var(--text);
      width: 100%;
      max-width: 1100px;
      text-align: left;
      padding-left: 4px;
      letter-spacing: -0.5px;
    }

    #page-layout {
      display: flex;
      gap: 32px;
      align-items: flex-start;
      width: 100%;
      max-width: 1100px;
    }

    #col-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 24px;
      min-width: 0;
    }

    #col-side {
      width: 300px;
      flex-shrink: 0;
    }

    @media (max-width: 800px) {
      #page-layout { flex-direction: column; align-items: stretch; }
      #col-side { width: 100%; }
      #clock { text-align: center; }
    }

    /* ── Weather Card ── */
    #weather-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px 32px;
      width: 100%;
      text-align: center;
      transition: opacity 0.3s;
    }

    #weather-card.loading { opacity: 0.5; }

    #weather-location {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    #weather-main {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    #weather-icon { font-size: 48px; line-height: 1; }

    #weather-temp {
      font-size: 56px;
      font-weight: 300;
      letter-spacing: -2px;
    }

    #weather-desc {
      font-size: 15px;
      color: var(--muted);
      margin-top: 6px;
      text-transform: capitalize;
    }

    #weather-details {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }

    #weather-details span { display: flex; align-items: center; gap: 4px; }

    #weather-error {
      font-size: 13px;
      color: #ef5350;
      margin-top: 8px;
    }

    #api-key-hint {
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
      line-height: 1.6;
    }

    #api-key-hint a { color: var(--accent); text-decoration: none; }
    #api-key-hint a:hover { text-decoration: underline; }

    /* ── Search Box ── */
    #search-form {
      width: 100%;
      display: flex;
      gap: 0;
    }

    #search-input {
      flex: 1;
      padding: 16px 20px;
      font-size: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-right: none;
      border-radius: var(--radius) 0 0 var(--radius);
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    #search-input::placeholder { color: var(--muted); }

    #search-input:focus {
      border-color: var(--accent);
    }

    #search-btn {
      padding: 16px 24px;
      background: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #search-btn:hover { background: var(--accent-hover); }

    /* ── Refresh button ── */
    #refresh-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      margin-top: 10px;
      text-decoration: underline;
    }
    #refresh-btn:hover { color: var(--text); }

    /* ── Quick Links ── */
    #links-section {
      width: 100%;
    }

    #links-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .link-item {
      position: relative;
    }

    .link-item a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text);
      font-size: 12px;
      width: 80px;
      transition: border-color 0.2s, background 0.2s;
      overflow: hidden;
    }

    .link-item a:hover {
      border-color: var(--accent);
      background: #21253a;
    }

    .link-item a img {
      width: 24px;
      height: 24px;
      border-radius: 4px;
    }

    .link-item a span {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 70px;
      text-align: center;
    }

    /* remove button — only visible in edit mode */
    .link-remove {
      display: none;
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      background: #ef5350;
      border: none;
      border-radius: 50%;
      color: #fff;
      font-size: 11px;
      line-height: 1;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      padding: 0;
      z-index: 10;
    }

    body.edit-mode .link-remove { display: flex; }
    body.edit-mode .link-item a { border-color: #ef535044; animation: wobble 0.4s infinite alternate; }

    @keyframes wobble {
      from { transform: rotate(-0.8deg); }
      to   { transform: rotate(0.8deg); }
    }

    .link-item[draggable="true"] { cursor: grab; }
    .link-item[draggable="true"]:active { cursor: grabbing; }
    .link-item.dragging { opacity: 0.35; }
    .link-item.drag-over > a { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }

    /* add button */
    #add-link-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 12px 16px;
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 12px;
      width: 80px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    #add-link-btn:hover { border-color: var(--accent); color: var(--accent); }
    #add-link-btn .plus { font-size: 20px; line-height: 1; }

    /* links toolbar */
    #links-toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }

    #edit-links-btn {
      background: none;
      border: none;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      text-decoration: underline;
    }
    #edit-links-btn:hover { color: var(--text); }

    /* ── Add Link Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 32px;
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #modal h3 { font-size: 15px; font-weight: 600; }

    .modal-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .modal-field label { font-size: 12px; color: var(--muted); }

    .modal-field input {
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .modal-field input:focus { border-color: var(--accent); }

    #modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .btn-cancel {
      padding: 8px 16px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
    }
    .btn-cancel:hover { border-color: var(--text); color: var(--text); }

    .btn-save {
      padding: 8px 16px;
      background: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-save:hover { background: var(--accent-hover); }

    /* ── Sticky Notes / Todo ── */
    #notes-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #notes-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    #notes-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    #notes-clear-done {
      background: none;
      border: none;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      text-decoration: underline;
    }
    #notes-clear-done:hover { color: #ef5350; }

    #notes-add-row {
      display: flex;
      gap: 6px;
    }

    #notes-input {
      flex: 1;
      padding: 8px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    #notes-input::placeholder { color: var(--muted); }
    #notes-input:focus { border-color: var(--accent); }

    #notes-add-btn {
      padding: 8px 12px;
      background: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 8px;
      color: #fff;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      transition: background 0.2s;
    }
    #notes-add-btn:hover { background: var(--accent-hover); }

    #notes-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 420px;
      overflow-y: auto;
    }

    #notes-list::-webkit-scrollbar { width: 4px; }
    #notes-list::-webkit-scrollbar-track { background: transparent; }
    #notes-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .note-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: opacity 0.2s;
    }

    .note-item.done { opacity: 0.45; }

    .note-check {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 1px;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
    }
    .note-check:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .note-check:checked::after {
      content: "✓";
      position: absolute;
      color: #fff;
      font-size: 10px;
      top: -1px;
      left: 1px;
    }

    .note-text {
      flex: 1;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }
    .note-item.done .note-text { text-decoration: line-through; color: var(--muted); }

    .note-delete {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      padding: 0 2px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .note-item:hover .note-delete { opacity: 1; }
    .note-delete:hover { color: #ef5350; }

    #notes-empty {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      padding: 12px 0;
    }
  </style>
</head>
<body>

  <div id="greeting"></div>
  <div id="clock"></div>

  <div id="page-layout">
    <!-- Left: main content -->
    <div id="col-main">

      <!-- Weather Card -->
      <div id="weather-card" class="loading">
        <div id="weather-location">Glasgow, GB</div>
        <div id="weather-main">
          <div id="weather-icon">⏳</div>
          <div id="weather-temp">--°</div>
        </div>
        <div id="weather-desc">Loading weather…</div>
        <div id="weather-details">
          <span>💧 <span id="weather-humidity">--</span></span>
          <span>💨 <span id="weather-wind">--</span></span>
          <span>👁 <span id="weather-feels">--</span></span>
        </div>
        <div id="weather-error"></div>
        <div id="api-key-hint" style="display:none">
          Add your free API key at the top of this file.<br>
          Get one free at <a href="https://home.openweathermap.org/users/sign_up" target="_blank">openweathermap.org</a>
          — takes about 2 minutes.
        </div>
        <button id="refresh-btn" onclick="fetchWeather()">↻ refresh</button>
      </div>

      <!-- Google Search -->
      <form id="search-form" action="https://www.google.com/search" method="GET" target="_self">
        <input id="search-input" type="text" name="q" placeholder="Search Google…" autofocus autocomplete="off" />
        <button id="search-btn" type="submit">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          Search
        </button>
      </form>

      <!-- Quick Links -->
      <div id="links-section">
        <div id="links-toolbar">
          <button id="edit-links-btn" onclick="toggleEditMode()">✎ edit links</button>
        </div>
        <div id="links-grid">
          <!-- rendered by JS -->
        </div>
      </div>

    </div><!-- /col-main -->

    <!-- Right: sticky notes -->
    <div id="col-side">
      <div id="notes-card">
        <div id="notes-header">
          <h2>📝 Notes</h2>
          <button id="notes-clear-done" onclick="clearDoneNotes()" title="Remove completed items">Clear done</button>
        </div>
        <div id="notes-add-row">
          <input id="notes-input" type="text" placeholder="Add a note or task…" maxlength="200" />
          <button id="notes-add-btn" onclick="addNote()" title="Add">+</button>
        </div>
        <div id="notes-list">
          <!-- rendered by JS -->
        </div>
      </div>
    </div><!-- /col-side -->

  </div><!-- /page-layout -->

  <!-- Add Link Modal -->
  <div id="modal-overlay">
    <div id="modal">
      <h3>Add quick link</h3>
      <div class="modal-field">
        <label for="modal-url">URL</label>
        <input id="modal-url" type="url" placeholder="https://example.com" />
      </div>
      <div class="modal-field">
        <label for="modal-name">Label</label>
        <input id="modal-name" type="text" placeholder="Example" maxlength="14" />
      </div>
      <div id="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveLink()">Add</button>
      </div>
    </div>
  </div>

  <script>
    // ══════════════════════════════════════════════
    //  CONFIGURATION — edit these two values
    // ══════════════════════════════════════════════
    const API_KEY  = "45a8daea4274e108a01d13347cf0e08f";   // OpenWeatherMap key
    const CITY     = "Glasgow";             // <-- change city if needed
    const COUNTRY  = "GB";                  // <-- ISO country code
    // ══════════════════════════════════════════════

    const WEATHER_ICONS = {
      "01d":"☀️","01n":"🌙","02d":"⛅","02n":"⛅","03d":"☁️","03n":"☁️",
      "04d":"☁️","04n":"☁️","09d":"🌧️","09n":"🌧️","10d":"🌦️","10n":"🌧️",
      "11d":"⛈️","11n":"⛈️","13d":"❄️","13n":"❄️","50d":"🌫️","50n":"🌫️"
    };

    async function fetchWeather() {
      const card = document.getElementById("weather-card");
      const errEl = document.getElementById("weather-error");
      const hintEl = document.getElementById("api-key-hint");
      errEl.textContent = "";
      hintEl.style.display = "none";
      card.classList.add("loading");

      if (!API_KEY || API_KEY === "YOUR_API_KEY_HERE") {
        card.classList.remove("loading");
        document.getElementById("weather-icon").textContent = "🔑";
        document.getElementById("weather-temp").textContent = "--°";
        document.getElementById("weather-desc").textContent = "API key needed";
        hintEl.style.display = "block";
        return;
      }

      try {
        const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(CITY)},${COUNTRY}&appid=${API_KEY}&units=metric`;
        const res  = await fetch(url);
        if (!res.ok) throw new Error(`API error ${res.status}`);
        const d = await res.json();

        const icon  = WEATHER_ICONS[d.weather[0].icon] || "🌡️";
        const temp  = Math.round(d.main.temp);
        const feels = Math.round(d.main.feels_like);
        const desc  = d.weather[0].description;
        const humid = d.main.humidity;
        const wind  = Math.round(d.wind.speed * 3.6); // m/s → km/h
        const loc   = `${d.name}, ${d.sys.country}`;

        document.getElementById("weather-location").textContent = loc;
        document.getElementById("weather-icon").textContent     = icon;
        document.getElementById("weather-temp").textContent     = `${temp}°`;
        document.getElementById("weather-desc").textContent     = desc;
        document.getElementById("weather-humidity").textContent = `${humid}% humidity`;
        document.getElementById("weather-wind").textContent     = `${wind} km/h wind`;
        document.getElementById("weather-feels").textContent    = `Feels ${feels}°`;

      } catch (e) {
        errEl.textContent = "Could not load weather. Check API key or connection.";
        document.getElementById("weather-icon").textContent = "⚠️";
        document.getElementById("weather-temp").textContent = "--°";
        document.getElementById("weather-desc").textContent = "";
      } finally {
        card.classList.remove("loading");
      }
    }

    // ── Clock ──
    function updateClock() {
      const now = new Date();
      const hour = now.getHours();
      const greeting = hour < 12 ? "Good morning" : hour < 18 ? "Good afternoon" : "Good evening";
      document.getElementById("greeting").textContent = `${greeting}, Iain`;
      document.getElementById("clock").textContent = now.toLocaleString("en-GB", {
        weekday:"long", day:"numeric", month:"long",
        hour:"2-digit", minute:"2-digit"
      });
    }

    // ── Init ──
    fetchWeather();
    updateClock();
    setInterval(updateClock, 1000);
    setInterval(fetchWeather, 10 * 60 * 1000); // refresh weather every 10 min

    // Focus search on any keypress (unless already focused)
    document.addEventListener("keydown", (e) => {
      const inp = document.getElementById("search-input");
      const tag = document.activeElement.tagName;
      const isTyping = tag === "INPUT" || tag === "TEXTAREA";
      if (!isTyping && e.key.length === 1 && !e.ctrlKey && !e.metaKey) {
        inp.focus();
      }
    });

    // ══════════════════════════════════════════════
    //  QUICK LINKS
    // ══════════════════════════════════════════════
    const DEFAULT_LINKS = [
      { name: "GitHub",    url: "https://github.com" },
      { name: "Gmail",     url: "https://mail.google.com" },
      { name: "YouTube",   url: "https://youtube.com" },
      { name: "LinkedIn",  url: "https://linkedin.com" },
      { name: "BBC News",  url: "https://bbc.co.uk/news" },
    ];

    const STORAGE_KEY = "quicklinks_v1";

    let dragSrcIndex = null;

    function loadLinks() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : DEFAULT_LINKS;
      } catch { return DEFAULT_LINKS; }
    }

    function saveLinks(links) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(links));
    }

    function faviconUrl(url) {
      try {
        const domain = new URL(url).origin;
        return `https://www.google.com/s2/favicons?domain=${encodeURIComponent(domain)}&sz=32`;
      } catch { return ""; }
    }

    function renderLinks() {
      const links = loadLinks();
      const grid  = document.getElementById("links-grid");
      grid.innerHTML = "";

      links.forEach((link, i) => {
        const item = document.createElement("div");
        item.className = "link-item";

        const a = document.createElement("a");
        a.href = link.url;
        a.title = link.url;

        const img = document.createElement("img");
        img.src = faviconUrl(link.url);
        img.alt = "";
        img.onerror = () => { img.style.display = "none"; };

        const span = document.createElement("span");
        span.textContent = link.name;

        a.appendChild(img);
        a.appendChild(span);

        const removeBtn = document.createElement("button");
        removeBtn.className = "link-remove";
        removeBtn.title = "Remove";
        removeBtn.textContent = "×";
        removeBtn.onclick = (e) => { e.preventDefault(); removeLink(i); };

        item.appendChild(a);
        item.appendChild(removeBtn);

        // drag-to-reorder
        item.draggable = true;
        item.addEventListener("dragstart", (e) => {
          dragSrcIndex = i;
          e.dataTransfer.effectAllowed = "move";
          setTimeout(() => item.classList.add("dragging"), 0);
        });
        item.addEventListener("dragend", () => {
          item.classList.remove("dragging");
          grid.querySelectorAll(".link-item").forEach(el => el.classList.remove("drag-over"));
        });
        item.addEventListener("dragover", (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = "move";
          grid.querySelectorAll(".link-item").forEach(el => el.classList.remove("drag-over"));
          item.classList.add("drag-over");
        });
        item.addEventListener("drop", (e) => {
          e.preventDefault();
          item.classList.remove("drag-over");
          if (dragSrcIndex === null || dragSrcIndex === i) return;
          const links = loadLinks();
          const [moved] = links.splice(dragSrcIndex, 1);
          links.splice(i, 0, moved);
          saveLinks(links);
          renderLinks();
        });

        grid.appendChild(item);
      });

      // add button
      const addBtn = document.createElement("button");
      addBtn.id = "add-link-btn";
      addBtn.onclick = openModal;
      addBtn.innerHTML = `<span class="plus">+</span><span>Add link</span>`;
      grid.appendChild(addBtn);
    }

    function removeLink(index) {
      const links = loadLinks();
      links.splice(index, 1);
      saveLinks(links);
      renderLinks();
    }

    function toggleEditMode() {
      const editing = document.body.classList.toggle("edit-mode");
      document.getElementById("edit-links-btn").textContent = editing ? "✓ done" : "✎ edit links";
    }

    // ── Modal ──
    function openModal() {
      document.getElementById("modal-url").value  = "";
      document.getElementById("modal-name").value = "";
      document.getElementById("modal-overlay").classList.add("open");
      setTimeout(() => document.getElementById("modal-url").focus(), 50);
    }

    function closeModal() {
      document.getElementById("modal-overlay").classList.remove("open");
    }

    function saveLink() {
      const url  = document.getElementById("modal-url").value.trim();
      const name = document.getElementById("modal-name").value.trim();
      if (!url || !name) return;

      const links = loadLinks();
      links.push({ name, url });
      saveLinks(links);
      renderLinks();
      closeModal();
    }

    // close modal on overlay click
    document.getElementById("modal-overlay").addEventListener("click", (e) => {
      if (e.target === document.getElementById("modal-overlay")) closeModal();
    });

    // save on Enter in modal inputs
    document.getElementById("modal-url").addEventListener("keydown",  (e) => { if (e.key === "Enter") document.getElementById("modal-name").focus(); });
    document.getElementById("modal-name").addEventListener("keydown", (e) => { if (e.key === "Enter") saveLink(); });

    renderLinks();

    // ══════════════════════════════════════════════
    //  STICKY NOTES / TODO
    // ══════════════════════════════════════════════
    const NOTES_KEY = "stickynotes_v1";

    function loadNotes() {
      try {
        const raw = localStorage.getItem(NOTES_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch { return []; }
    }

    function saveNotes(notes) {
      localStorage.setItem(NOTES_KEY, JSON.stringify(notes));
    }

    function renderNotes() {
      const notes = loadNotes();
      const list  = document.getElementById("notes-list");
      list.innerHTML = "";

      if (notes.length === 0) {
        list.innerHTML = `<div id="notes-empty">No notes yet. Add one above.</div>`;
        return;
      }

      // show undone first, then done
      const sorted = [...notes.filter(n => !n.done), ...notes.filter(n => n.done)];

      sorted.forEach((note) => {
        const item = document.createElement("div");
        item.className = "note-item" + (note.done ? " done" : "");

        const check = document.createElement("input");
        check.type = "checkbox";
        check.className = "note-check";
        check.checked = note.done;
        check.onchange = () => toggleNote(note.id);

        const text = document.createElement("div");
        text.className = "note-text";
        text.textContent = note.text;

        const del = document.createElement("button");
        del.className = "note-delete";
        del.title = "Delete";
        del.textContent = "×";
        del.onclick = () => deleteNote(note.id);

        item.appendChild(check);
        item.appendChild(text);
        item.appendChild(del);
        list.appendChild(item);
      });
    }

    function addNote() {
      const input = document.getElementById("notes-input");
      const text  = input.value.trim();
      if (!text) return;

      const notes = loadNotes();
      notes.unshift({ id: Date.now(), text, done: false });
      saveNotes(notes);
      renderNotes();
      input.value = "";
      input.focus();
    }

    function toggleNote(id) {
      const notes = loadNotes();
      const note  = notes.find(n => n.id === id);
      if (note) note.done = !note.done;
      saveNotes(notes);
      renderNotes();
    }

    function deleteNote(id) {
      saveNotes(loadNotes().filter(n => n.id !== id));
      renderNotes();
    }

    function clearDoneNotes() {
      saveNotes(loadNotes().filter(n => !n.done));
      renderNotes();
    }

    document.getElementById("notes-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") { e.preventDefault(); addNote(); }
    });

    renderNotes();
  </script>
</body>
</html>
