<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#1a1d27"/>
  <!-- roof -->
  <polygon points="16,4 29,17 3,17" fill="#5b7cf6"/>
  <!-- chimney -->
  <rect x="20" y="7" width="3" height="6" rx="1" fill="#5b7cf6"/>
  <!-- house body -->
  <rect x="6" y="16" width="20" height="13" rx="1" fill="#5b7cf6"/>
  <!-- door -->
  <rect x="13" y="21" width="6" height="8" rx="1.5" fill="#1a1d27" opacity="0.55"/>
  <!-- window left -->
  <rect x="8" y="19" width="4" height="4" rx="1" fill="#1a1d27" opacity="0.45"/>
  <!-- window right -->
  <rect x="20" y="19" width="4" height="4" rx="1" fill="#1a1d27" opacity="0.45"/>
</svg>
